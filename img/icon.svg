<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="ig1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc2233;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ig2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#444;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4444;stop-opacity:1" />
    </linearGradient>
    <filter id="iglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark circle background -->
  <circle cx="60" cy="60" r="58" fill="#0a0a1a" stroke="#1a1a2e" stroke-width="2"/>

  <!-- Tachometer -->
  <g transform="translate(60, 72)">
    <!-- Background arc -->
    <path d="M-40,-5 A42,42 0 0,1 40,-5" fill="none" stroke="#222" stroke-width="7" stroke-linecap="round"/>
    <!-- Colored arc -->
    <path d="M-40,-5 A42,42 0 0,1 40,-5" fill="none" stroke="url(#ig2)" stroke-width="7" stroke-linecap="round"/>
    <!-- Redline glow -->
    <path d="M28,-30 A42,42 0 0,1 40,-5" fill="none" stroke="#ff4444" stroke-width="9" stroke-linecap="round" opacity="0.15"/>

    <!-- Tick marks -->
    <line x1="-36" y1="-15" x2="-30" y2="-12" stroke="#555" stroke-width="2" stroke-linecap="round"/>
    <line x1="-26" y1="-32" x2="-22" y2="-27" stroke="#666" stroke-width="2" stroke-linecap="round"/>
    <line x1="-6" y1="-40" x2="-5" y2="-34" stroke="#777" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="-38" x2="14" y2="-32" stroke="#999" stroke-width="2" stroke-linecap="round"/>
    <line x1="32" y1="-25" x2="27" y2="-21" stroke="#ff6b35" stroke-width="2" stroke-linecap="round"/>
    <line x1="38" y1="-10" x2="32" y2="-8" stroke="#ff4444" stroke-width="2" stroke-linecap="round"/>

    <!-- Needle -->
    <line x1="0" y1="2" x2="28" y2="-24" stroke="#ff4444" stroke-width="2.5" stroke-linecap="round" filter="url(#iglow)"/>

    <!-- Center hub -->
    <circle cx="0" cy="0" r="6" fill="url(#ig1)"/>
    <circle cx="0" cy="0" r="3" fill="#0a0a1a"/>
    <circle cx="0" cy="0" r="1.5" fill="#ff4444"/>
  </g>

  <!-- SR text -->
  <text x="60" y="40" font-family="'Rajdhani', sans-serif" font-weight="700" font-size="28" fill="#ffffff" text-anchor="middle" letter-spacing="2">SR</text>
</svg>
